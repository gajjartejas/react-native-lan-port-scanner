# This workflow runs tests and publishes the package to npm
# using npm Trusted Publishers (OIDC)

name: Node.js Package

on:
  release:
    types: [published] # <-- changed from created

permissions:
  contents: read
  id-token: write # <-- required for npm trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # --> optional
      # - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      - run: npm publish --provenance --access public # <-- updated